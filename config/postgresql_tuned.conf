# config/postgresql_tuned.conf
# Baseline performance tuning for the argan database

# Memory Settings
shared_buffers = 1GB                  # 25% of available RAM is recommended for dedicated DBs
work_mem = 16MB                       # Memory for internal sort operations and hash tables
maintenance_work_mem = 256MB          # Memory for maintenance operations (VACUUM, CREATE INDEX)
effective_cache_size = 3GB            # Estimate of memory available for disk caching

# Checkpoint Settings
checkpoint_completion_target = 0.9    # Spread out checkpoint I/O
wal_buffers = 16MB                    # Memory for WAL data before writing to disk

# Query Planner Settings
random_page_cost = 1.1                # Assumes SSD storage (lower than default 4.0)
effective_io_concurrency = 200        # Concurrent disk I/O operations (good for SSDs)
